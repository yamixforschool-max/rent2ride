{% extends 'base.html' %}

{% block title %}Password Reset Complete - Rent2Ride{% endblock %}

{% block content %}
<div class="container my-4 my-md-5">
    <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-4">
            <div class="card shadow">
                <div class="card-body p-5 text-center">
                    <i class="bi bi-check-circle-fill text-success" style="font-size: 4rem;"></i>
                    <h2 class="mt-3 mb-3">Password Reset Complete</h2>
                    <p class="text-muted">Your password has been successfully reset. You can now log in with your new password.</p>
                    <a href="{% url 'login' %}" class="btn btn-primary">Sign In</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
