{% extends 'base.html' %}

{% block title %}Set New Password - Rent2Ride{% endblock %}

{% block content %}
<div class="container my-4 my-md-5">
    <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-4">
            <div class="card shadow">
                <div class="card-body p-5">
                    <h2 class="card-title text-center mb-4">Set New Password</h2>
                    {% if validlink %}
                        <form method="POST">
                            {% csrf_token %}
                            <div class="mb-3">
                                <label for="id_new_password1" class="form-label">New Password</label>
                                <input type="password" class="form-control" id="id_new_password1" name="new_password1" required>
                            </div>
                            <div class="mb-3">
                                <label for="id_new_password2" class="form-label">Confirm New Password</label>
                                <input type="password" class="form-control" id="id_new_password2" name="new_password2" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100">Change Password</button>
                        </form>
                    {% else %}
                        <div class="alert alert-danger">
                            <p>The password reset link is invalid or has expired. Please request a new one.</p>
                            <a href="{% url 'password_reset' %}" class="btn btn-primary">Request New Link</a>
                        </div>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
