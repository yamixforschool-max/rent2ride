{% extends 'base.html' %}

{% block title %}Password Reset Sent - Rent2Ride{% endblock %}

{% block content %}
<div class="container my-4 my-md-5">
    <div class="row justify-content-center">
        <div class="col-12 col-sm-10 col-md-8 col-lg-6 col-xl-4">
            <div class="card shadow">
                <div class="card-body p-5 text-center">
                    <i class="bi bi-envelope-check text-primary" style="font-size: 4rem;"></i>
                    <h2 class="mt-3 mb-3">Check Your Email</h2>
                    <p class="text-muted">We've sent you instructions for resetting your password. Please check your email inbox.</p>
                    <a href="{% url 'login' %}" class="btn btn-primary">Back to Login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
